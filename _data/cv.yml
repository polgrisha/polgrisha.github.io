  summary: A second year PhD student at the University of Tübingen and IMPRS-IS with a strong background in applied mathematics, computer science, and industrial research in machine learning. My research focuses on the interpretability of deep learning models for NLP and IR, aiming to make complex ML systems more transparent and reliable by understanding their internal behavior. Proven track record of publishing in top-tier venues (EMNLP, SIGIR) and contributing to industrial R\&D for production search engines and voice assistants.

